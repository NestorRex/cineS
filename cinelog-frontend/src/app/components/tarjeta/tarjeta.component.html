<div class="card h-100 shadow-sm border-0" style="transition: transform 0.2s"
  (mouseenter)="$event.target && card.classList.add('shadow')"
  #card>
  
  <!-- Property binding: [src] y [alt] -->
  <img
    [src]="pelicula.poster_url || 'assets/placeholder.jpg'"
    [alt]="pelicula.titulo"
    class="card-img-top"
    style="height: 300px; object-fit: cover;">

  <div class="card-body d-flex flex-column">
    <!-- Interpolación -->
    <h5 class="card-title">{{ pelicula.titulo }}</h5>
    <p class="card-text text-muted small">
      {{ pelicula.director }} · {{ pelicula.anio }}
    </p>

    <!-- @if en lugar de *ngIf -->
    @if (pelicula.genero) {
      <span class="badge bg-secondary mb-2">{{ pelicula.genero }}</span>
    }

    <!-- Badge tipo -->
    <span class="badge mb-2" [class.bg-primary]="pelicula.tipo === 'pelicula'" [class.bg-success]="pelicula.tipo === 'serie'">
      {{ pelicula.tipo === 'pelicula' ? '🎬 Película' : '📺 Serie' }}
    </span>

    <p class="card-text flex-grow-1 small">{{ pelicula.sinopsis | slice:0:100 }}...</p>

    <div class="d-flex gap-2 mt-auto">
      <!-- Event binding: (click) -->
      <button class="btn btn-primary btn-sm flex-grow-1" (click)="onVerDetalle()">
        Ver detalle
      </button>
      <button class="btn btn-outline-warning btn-sm" (click)="onAgregarFavorito()" title="Favorito">
        ♡
      </button>
    </div>
  </div>
</div>
