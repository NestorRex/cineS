<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
  <h2>🎥 Catálogo</h2>
  <div class="d-flex gap-2 align-items-center flex-wrap">
    <!-- Double binding con [(ngModel)] -->
    <select class="form-select form-select-sm" [(ngModel)]="filtroTipo" style="width:auto">
      <option value="todos">Todos</option>
      <option value="pelicula">Películas</option>
      <option value="serie">Series</option>
    </select>
    <button class="btn btn-outline-secondary btn-sm" (click)="irABuscar()">Buscar avanzado</button>
    <a routerLink="/agregar" class="btn btn-warning btn-sm">+ Agregar</a>
  </div>
</div>

@if (cargando) {
  <div class="text-center py-5">
    <div class="spinner-border text-warning"></div>
  </div>
}

@if (!cargando) {
  <!-- Contador usando interpolación -->
  <p class="text-muted mb-3">Mostrando {{ peliculasFiltradas.length }} resultado(s)</p>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    @for (pelicula of peliculasFiltradas; track pelicula.id) {
      <div class="col">
        <app-tarjeta
          [pelicula]="pelicula"
          [mostrarEliminar]="false"
          (verDetalle)="onVerDetalle($event)"
          (agregarFavorito)="onAgregarFavorito($event)"
        />
      </div>
    } @empty {
      <div class="col-12">
        <div class="alert alert-warning">No hay resultados para este filtro.</div>
      </div>
    }
  </div>
}
