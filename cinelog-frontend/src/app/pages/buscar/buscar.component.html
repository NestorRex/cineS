<h2 class="mb-4">🔍 Buscar</h2>

<!-- FORMULARIO POR TEMPLATE con ngModel (double binding) -->
<form #buscarForm="ngForm" (ngSubmit)="buscar()" class="card p-4 shadow-sm border-0 mb-4">
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label fw-semibold">Título</label>
      <input
        type="text"
        class="form-control"
        name="terminoBusqueda"
        [(ngModel)]="terminoBusqueda"
        #titulo="ngModel"
        minlength="2"
        placeholder="Busca por título...">
      @if (titulo.invalid && titulo.dirty) {
        <div class="text-danger small mt-1">Ingresa al menos 2 caracteres.</div>
      }
    </div>
    <div class="col-md-4">
      <label class="form-label fw-semibold">Tipo</label>
      <!-- Double binding [(ngModel)] -->
      <select class="form-select" name="tipoFiltro" [(ngModel)]="tipoFiltro">
        <option value="todos">Todos</option>
        <option value="pelicula">Películas</option>
        <option value="serie">Series</option>
      </select>
    </div>
    <div class="col-md-2 d-flex align-items-end">
      <button type="submit" class="btn btn-warning w-100">Buscar</button>
    </div>
  </div>
</form>

<!-- Resultados -->
@if (buscado) {
  <p class="text-muted">{{ resultados.length }} resultado(s) para "{{ terminoBusqueda }}"</p>

  <div class="row row-cols-1 row-cols-md-3 g-4">
    @for (p of resultados; track p.id) {
      <div class="col">
        <app-tarjeta [pelicula]="p" (verDetalle)="onVerDetalle($event)" />
      </div>
    } @empty {
      <div class="col-12">
        <div class="alert alert-warning">No se encontraron resultados.</div>
      </div>
    }
  </div>
}
